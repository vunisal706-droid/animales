<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#16a34a">
    <title>Capitulín - Aventura en la Selva</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --color-primary: #16a34a;
            --color-primary-light: #dcfce7;
            --color-primary-dark: #15803d;
            --color-secondary: #f59e0b;
            --color-secondary-dark: #b45309;
            --color-accent: #ea580c;
            --color-accent-dark: #c2410c;
            --color-bg: #f0fdf4;
            --color-surface: #ffffff;
            --color-text: #14532d;
            --color-text-muted: #4d7c0f;
            --color-error: #dc2626;
            --color-error-bg: #fee2e2;
            --color-success: #16a34a;
            --color-success-bg: #dcfce7;
            --color-en: #2563eb;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        #root { width: 100%; height: 100%; }

        /* ===== Botones clay ===== */
        .clay-btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
        }
        .clay-btn:active { transform: translateY(4px); }
        .clay-btn:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 3px; }

        .btn-green  { background: var(--color-primary);   box-shadow: 0 6px 0 var(--color-primary-dark), 0 10px 16px rgba(0,0,0,0.15); }
        .btn-green:active  { box-shadow: 0 2px 0 var(--color-primary-dark), 0 4px 8px rgba(0,0,0,0.1); }
        .btn-orange { background: var(--color-accent);    box-shadow: 0 6px 0 var(--color-accent-dark), 0 10px 16px rgba(0,0,0,0.15); }
        .btn-orange:active { box-shadow: 0 2px 0 var(--color-accent-dark), 0 4px 8px rgba(0,0,0,0.1); }
        .btn-amber  { background: var(--color-secondary); box-shadow: 0 6px 0 var(--color-secondary-dark), 0 10px 16px rgba(0,0,0,0.15); }
        .btn-amber:active  { box-shadow: 0 2px 0 var(--color-secondary-dark), 0 4px 8px rgba(0,0,0,0.1); }
        .btn-blue   { background: #2563eb;                box-shadow: 0 6px 0 #1d4ed8, 0 10px 16px rgba(0,0,0,0.15); }
        .btn-blue:active   { box-shadow: 0 2px 0 #1d4ed8, 0 4px 8px rgba(0,0,0,0.1); }
        .btn-pink   { background: #db2777;                box-shadow: 0 6px 0 #9d174d, 0 10px 16px rgba(0,0,0,0.15); }
        .btn-pink:active   { box-shadow: 0 2px 0 #9d174d, 0 4px 8px rgba(0,0,0,0.1); }
        .btn-brown  { background: #92400e;                box-shadow: 0 6px 0 #713f12, 0 10px 16px rgba(0,0,0,0.15); }
        .btn-brown:active  { box-shadow: 0 2px 0 #713f12, 0 4px 8px rgba(0,0,0,0.1); }

        .clay-card {
            background: var(--color-surface);
            border-radius: 24px;
            box-shadow: 8px 8px 0 0 rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.12);
            border: 2px solid rgba(0,0,0,0.06);
        }

        /* ===== Animaciones ===== */
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-10px) rotate(2deg)} }
        @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

        .anim-pop { animation: popIn 0.35s ease-out; }
        .anim-fade { animation: fadeInUp 0.3s ease-out; }
        .anim-shake { animation: shake 0.4s ease-in-out; }
        .anim-bounce { animation: bounce 1.2s ease-in-out infinite; }
        .anim-float { animation: float 3s ease-in-out infinite; }
        .anim-correct { animation: correctPulse 0.5s ease-in-out; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* ===== Controles táctiles ===== */
        .touch-controls {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
            pointer-events: none;
        }

        .touch-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            border: none;
            box-shadow: 0 6px 0 rgba(21,128,61,0.55), 0 10px 18px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            pointer-events: auto;
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .touch-btn:active {
            background: var(--color-primary-light);
            transform: translateY(4px) scale(0.96);
            box-shadow: 0 2px 0 rgba(21,128,61,0.55), 0 4px 8px rgba(0,0,0,0.2);
        }

        .touch-btn svg { width: 34px; height: 34px; }

        .left-controls { display: flex; gap: 16px; }

        @media (max-width: 768px) {
            .touch-btn { width: 66px; height: 66px; }
            .touch-btn svg { width: 30px; height: 30px; }
        }

        /* ===== Pantalla título ===== */
        .title-word {
            font-size: clamp(2.6rem, 11vw, 4.5rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 0 var(--color-primary-dark), 0 8px 18px rgba(0,0,0,0.25);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ Sistema de sonido ============
        const SoundSystem = {
          audioContext: null,
          init() {
            if (!this.audioContext) {
              try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
              } catch(e) {}
            }
          },
          tone(freq, dur, type = 'sine', vol = 0.25, delay = 0) {
            try {
              this.init();
              if (!this.audioContext) return;
              const t = this.audioContext.currentTime + delay;
              const osc = this.audioContext.createOscillator();
              const g = this.audioContext.createGain();
              osc.connect(g); g.connect(this.audioContext.destination);
              osc.frequency.value = freq; osc.type = type;
              g.gain.setValueAtTime(vol, t);
              g.gain.exponentialRampToValueAtTime(0.01, t + dur);
              osc.start(t); osc.stop(t + dur);
            } catch(e) {}
          },
          playSuccess() { // arpegio alegre
            this.tone(523.25, 0.18, 'sine', 0.25, 0);
            this.tone(659.25, 0.18, 'sine', 0.25, 0.12);
            this.tone(783.99, 0.35, 'sine', 0.25, 0.24);
          },
          playCollect() {
            this.tone(700, 0.08, 'square', 0.15, 0);
            this.tone(1000, 0.12, 'square', 0.15, 0.06);
          },
          playError() {
            this.tone(220, 0.25, 'sawtooth', 0.12, 0);
            this.tone(180, 0.3, 'sawtooth', 0.12, 0.15);
          }
        };

        // ============ Utilidades de dibujo ============
        const rr = (ctx, x, y, w, h, r) => { // rounded rect path
          if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
          ctx.beginPath();
          ctx.moveTo(x + r.tl, y);
          ctx.lineTo(x + w - r.tr, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
          ctx.lineTo(x + w, y + h - r.br);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
          ctx.lineTo(x + r.bl, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
          ctx.lineTo(x, y + r.tl);
          ctx.quadraticCurveTo(x, y, x + r.tl, y);
          ctx.closePath();
        };

        const shade = (hex, amt) => { // aclara/oscurece un hex
          const n = parseInt(hex.slice(1), 16);
          let r = (n >> 16) + amt, g = ((n >> 8) & 0xff) + amt, b = (n & 0xff) + amt;
          r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
          return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        };

        // ============ Personaje: Capitulín estilo cartoon ============
        // Dibujado alrededor del origen; ocupa aprox -16..16 en X, -20..36 en Y
        const drawCharacter = (ctx, x, y, costume, scale = 1, opts = {}) => {
          const { facing = 1, walk = 0, jumping = false } = opts;
          ctx.save();
          ctx.translate(x, y);
          ctx.scale(scale * facing, scale);
          ctx.lineJoin = 'round';
          ctx.lineCap = 'round';

          // Configuración por traje
          const C = {
            default:   { body: '#e11d48', bodyD: '#9f1239', skin: '#fcd9b8', hair: '#3d2817', pants: '#1d4ed8', cape: null, mask: null, chest: null, helmet: null },
            superman:  { body: '#1d4ed8', bodyD: '#1e3a8a', skin: '#fcd9b8', hair: '#1c1917', pants: '#dc2626', cape: '#dc2626', mask: null, chest: '#fbbf24', helmet: null },
            batman:    { body: '#374151', bodyD: '#1f2937', skin: '#fcd9b8', hair: null, pants: '#111827', cape: '#111827', mask: 'bat', chest: '#fbbf24', helmet: null },
            spiderman: { body: '#dc2626', bodyD: '#991b1b', skin: '#dc2626', hair: null, pants: '#1d4ed8', cape: null, mask: 'spider', chest: '#111827', helmet: null },
            hulk:      { body: '#7e22ce', bodyD: '#581c87', skin: '#4ade80', hair: '#166534', pants: '#7e22ce', cape: null, mask: null, chest: null, helmet: null },
            thor:      { body: '#334155', bodyD: '#1e293b', skin: '#fcd9b8', hair: '#fbbf24', pants: '#475569', cape: '#dc2626', mask: null, chest: '#cbd5e1', helmet: null, hammer: true },
            ironman:   { body: '#dc2626', bodyD: '#991b1b', skin: '#dc2626', hair: null, pants: '#dc2626', cape: null, mask: 'iron', chest: '#38bdf8', helmet: '#fbbf24' },
            mario:     { body: '#dc2626', bodyD: '#991b1b', skin: '#fcd9b8', hair: '#3d2817', pants: '#1d4ed8', cape: null, mask: null, chest: null, helmet: null, cap: true }
          }[costume] || null;
          const cfg = C || {
            body: '#e11d48', bodyD: '#9f1239', skin: '#fcd9b8', hair: '#3d2817', pants: '#1d4ed8'
          };

          const legSwing = jumping ? 0 : Math.sin(walk) * 5;
          const armSwing = jumping ? -6 : Math.sin(walk) * 4;
          const bob = jumping ? -2 : Math.abs(Math.sin(walk)) * 1.5;
          const OUT = '#3b2417'; // color de contorno cartoon

          ctx.translate(0, -bob);

          // ---- Capa (detrás) ----
          if (cfg.cape) {
            const flap = jumping ? 10 : Math.sin(walk * 0.7) * 4;
            ctx.fillStyle = cfg.cape;
            ctx.strokeStyle = shade(cfg.cape, -40);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-2, 8);
            ctx.quadraticCurveTo(-16 - flap, 20, -12 - flap, 34);
            ctx.quadraticCurveTo(-6, 30, -1, 32);
            ctx.lineTo(2, 10);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
          }

          // ---- Pierna trasera ----
          ctx.strokeStyle = OUT; ctx.lineWidth = 1.6;
          ctx.fillStyle = shade(cfg.pants, -25);
          rr(ctx, -7 + legSwing * -0.6, 20, 6, 12, 3); ctx.fill(); ctx.stroke();
          // zapato trasero
          ctx.fillStyle = '#6b3410';
          rr(ctx, -9 + legSwing * -0.6, 30, 9, 5, { tl: 3, tr: 3, br: 3, bl: 3 }); ctx.fill(); ctx.stroke();

          // ---- Pierna delantera ----
          ctx.fillStyle = cfg.pants;
          rr(ctx, 1 + legSwing * 0.6, 20, 6, 12, 3); ctx.fill(); ctx.stroke();
          ctx.fillStyle = '#8b4513';
          rr(ctx, 0 + legSwing * 0.6, 30, 10, 5, { tl: 3, tr: 4, br: 4, bl: 3 }); ctx.fill(); ctx.stroke();

          // ---- Brazo trasero ----
          ctx.fillStyle = shade(cfg.body, -30);
          ctx.save();
          ctx.translate(-8, 11);
          ctx.rotate((-armSwing) * 0.06);
          rr(ctx, -2.5, 0, 5, 12, 2.5); ctx.fill(); ctx.stroke();
          ctx.fillStyle = cfg.skin;
          ctx.beginPath(); ctx.arc(0, 12, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          ctx.restore();

          // ---- Cuerpo ----
          const grad = ctx.createLinearGradient(0, 6, 0, 24);
          grad.addColorStop(0, cfg.body);
          grad.addColorStop(1, cfg.bodyD);
          ctx.fillStyle = grad;
          rr(ctx, -9, 6, 18, 17, { tl: 8, tr: 8, br: 6, bl: 6 }); ctx.fill(); ctx.stroke();

          // Emblema en el pecho
          if (cfg.chest) {
            ctx.fillStyle = cfg.chest;
            if (cfg.mask === 'spider') { // araña simple
              ctx.beginPath(); ctx.ellipse(0, 14, 2, 3.2, 0, 0, Math.PI * 2); ctx.fill();
              ctx.strokeStyle = cfg.chest; ctx.lineWidth = 1;
              for (let i = 0; i < 4; i++) {
                const a = -0.6 + i * 0.4;
                ctx.beginPath(); ctx.moveTo(0, 13); ctx.lineTo(Math.cos(a) * 6, 13 + Math.sin(a) * 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-Math.cos(a) * 6, 15 + Math.sin(a) * 5); ctx.stroke();
              }
              ctx.strokeStyle = OUT;
            } else if (costume === 'ironman') { // reactor arc
              ctx.beginPath(); ctx.arc(0, 13, 3.2, 0, Math.PI * 2); ctx.fill();
              ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.arc(0, 13, 4.5, 0, Math.PI * 2); ctx.stroke();
              ctx.strokeStyle = OUT; ctx.lineWidth = 1.6;
            } else { // rombo/escudo
              ctx.beginPath();
              ctx.moveTo(0, 9); ctx.lineTo(4.5, 13); ctx.lineTo(0, 17.5); ctx.lineTo(-4.5, 13);
              ctx.closePath(); ctx.fill();
              ctx.stroke();
            }
          } else if (costume === 'mario') {
            // Peto vaquero con botones
            ctx.fillStyle = '#1d4ed8';
            rr(ctx, -6, 12, 12, 11, { tl: 3, tr: 3, br: 5, bl: 5 }); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(-3.5, 14, 1.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(3.5, 14, 1.2, 0, Math.PI * 2); ctx.fill();
          } else if (!C) {
            // Capitulín: banda dorada estilo capitán
            ctx.fillStyle = '#fbbf24';
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(-9, 9); ctx.lineTo(-3, 23); ctx.lineTo(1, 23); ctx.lineTo(-5, 9);
            ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.restore();
          }

          // ---- Brazo delantero ----
          ctx.fillStyle = cfg.body;
          ctx.save();
          ctx.translate(8, 11);
          ctx.rotate(armSwing * 0.06 + (cfg.hammer ? -0.5 : 0));
          rr(ctx, -2.5, 0, 5, 12, 2.5); ctx.fill(); ctx.stroke();
          ctx.fillStyle = cfg.skin;
          ctx.beginPath(); ctx.arc(0, 12, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          // Martillo de Thor
          if (cfg.hammer) {
            ctx.fillStyle = '#78350f';
            rr(ctx, -1, 12, 2.5, 10, 1); ctx.fill(); ctx.stroke();
            const hg = ctx.createLinearGradient(-6, 20, 6, 28);
            hg.addColorStop(0, '#e2e8f0'); hg.addColorStop(1, '#94a3b8');
            ctx.fillStyle = hg;
            rr(ctx, -6, 20, 13, 8, 2); ctx.fill(); ctx.stroke();
          }
          ctx.restore();

          // ---- Cabeza (grande, estilo chibi) ----
          ctx.fillStyle = cfg.skin;
          ctx.beginPath();
          ctx.arc(0, -4, 11, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();

          // Orejas
          if (cfg.mask !== 'spider' && cfg.mask !== 'iron') {
            ctx.fillStyle = cfg.skin;
            ctx.beginPath(); ctx.arc(-10.5, -3, 2.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          }

          // Pelo / máscara / casco
          if (cfg.mask === 'iron') {
            ctx.fillStyle = cfg.helmet;
            ctx.beginPath(); ctx.arc(0, -4, 11, Math.PI * 0.95, Math.PI * 2.05); ctx.fill(); ctx.stroke();
            ctx.fillStyle = cfg.helmet;
            rr(ctx, -11, -6, 22, 4, 2); ctx.fill();
          } else if (cfg.mask === 'bat') {
            ctx.fillStyle = '#1f2937';
            ctx.beginPath(); ctx.arc(0, -4, 11, Math.PI * 0.85, Math.PI * 2.15); ctx.fill(); ctx.stroke();
            // orejas de murciélago
            ctx.beginPath(); ctx.moveTo(-8, -11); ctx.lineTo(-6, -19); ctx.lineTo(-3, -12); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(8, -11); ctx.lineTo(6, -19); ctx.lineTo(3, -12); ctx.closePath(); ctx.fill(); ctx.stroke();
          } else if (cfg.hair) {
            ctx.fillStyle = cfg.hair;
            ctx.beginPath();
            ctx.arc(0, -6, 11.2, Math.PI * 0.95, Math.PI * 2.05);
            ctx.quadraticCurveTo(11, -1, 8, -2);
            ctx.quadraticCurveTo(5, -8, 0, -7);
            ctx.quadraticCurveTo(-5, -8, -8, -2);
            ctx.quadraticCurveTo(-11, -1, -11.1, -4);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            // mechón
            ctx.beginPath();
            ctx.moveTo(2, -14.5);
            ctx.quadraticCurveTo(6, -18, 8, -14);
            ctx.quadraticCurveTo(5, -14.5, 4, -12.5);
            ctx.closePath(); ctx.fill();
          }

          // Gorra de Mario
          if (cfg.cap) {
            ctx.fillStyle = '#dc2626';
            ctx.beginPath(); ctx.arc(0, -8, 10.5, Math.PI, Math.PI * 2); ctx.fill(); ctx.stroke();
            rr(ctx, 2, -10, 12, 4, { tl: 1, tr: 4, br: 4, bl: 1 }); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(0, -11, 3.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#dc2626';
            ctx.font = 'bold 5px Fredoka, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('M', 0, -9.2);
          }

          // ---- Ojos grandes cartoon ----
          const eyeY = -4;
          if (cfg.mask === 'spider') {
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#111827'; ctx.lineWidth = 1.4;
            ctx.beginPath(); ctx.ellipse(-4, eyeY, 3.4, 4.4, -0.25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(4.5, eyeY, 3.4, 4.4, 0.25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = OUT;
          } else if (cfg.mask === 'iron') {
            ctx.fillStyle = '#7dd3fc';
            rr(ctx, -7, eyeY - 1.5, 5, 3, 1.5); ctx.fill();
            rr(ctx, 2.5, eyeY - 1.5, 5, 3, 1.5); ctx.fill();
          } else {
            // esclerótica
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.ellipse(-3.8, eyeY, 3, 3.8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(4.2, eyeY, 3, 3.8, 0, 0, Math.PI * 2); ctx.fill();
            // pupilas (miran hacia delante)
            ctx.fillStyle = '#2d1b0e';
            ctx.beginPath(); ctx.arc(-2.9, eyeY + 0.5, 1.9, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(5.1, eyeY + 0.5, 1.9, 0, Math.PI * 2); ctx.fill();
            // brillo
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-2.3, eyeY - 0.3, 0.7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(5.7, eyeY - 0.3, 0.7, 0, Math.PI * 2); ctx.fill();
            // cejas
            ctx.strokeStyle = cfg.hair || '#374151';
            ctx.lineWidth = 1.4;
            ctx.beginPath(); ctx.arc(-3.8, eyeY - 3.6, 2.6, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
            ctx.beginPath(); ctx.arc(4.2, eyeY - 3.6, 2.6, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
            ctx.strokeStyle = OUT;
          }

          // Mofletes
          if (cfg.mask !== 'spider' && cfg.mask !== 'iron' && costume !== 'hulk') {
            ctx.fillStyle = 'rgba(244,114,182,0.45)';
            ctx.beginPath(); ctx.ellipse(-7, 0.5, 2, 1.3, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(7.5, 0.5, 2, 1.3, 0, 0, Math.PI * 2); ctx.fill();
          }

          // Nariz + sonrisa
          if (cfg.mask !== 'spider' && cfg.mask !== 'iron') {
            ctx.fillStyle = shade(cfg.skin, -35);
            ctx.beginPath(); ctx.ellipse(0.5, -0.5, 1.4, 1, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#7c2d12';
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.arc(0.5, 1.2, 3.4, Math.PI * 0.15, Math.PI * 0.85);
            ctx.stroke();
            ctx.strokeStyle = OUT;
          }

          // Bigote Mario
          if (cfg.cap) {

        // ============ Escenario: selva ============
        const drawJungleBackground = (ctx, W, H, theme, t) => {
          // Cielo
          const sky = ctx.createLinearGradient(0, 0, 0, H);
          sky.addColorStop(0, theme.skyTop);
          sky.addColorStop(0.65, theme.skyBottom);
          sky.addColorStop(1, theme.ground);
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, W, H);

          // Sol con halo
          ctx.save();
          const sunX = 700, sunY = 60;
          const halo = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 70);
          halo.addColorStop(0, 'rgba(253,224,71,0.9)');
          halo.addColorStop(0.4, 'rgba(253,224,71,0.35)');
          halo.addColorStop(1, 'rgba(253,224,71,0)');
          ctx.fillStyle = halo;
          ctx.fillRect(sunX - 80, sunY - 80, 160, 160);
          ctx.fillStyle = '#fde047';
          ctx.beginPath(); ctx.arc(sunX, sunY, 26, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#fef9c3';
          ctx.beginPath(); ctx.arc(sunX - 7, sunY - 7, 10, 0, Math.PI * 2); ctx.fill();
          ctx.restore();

          // Montañas / colinas lejanas
          ctx.fillStyle = theme.hillsFar;
          ctx.beginPath();
          ctx.moveTo(0, 340);
          ctx.quadraticCurveTo(120, 220, 260, 330);
          ctx.quadraticCurveTo(400, 240, 560, 335);
          ctx.quadraticCurveTo(690, 250, 800, 330);
          ctx.lineTo(800, H); ctx.lineTo(0, H);
          ctx.closePath(); ctx.fill();

          ctx.fillStyle = theme.hillsNear;
          ctx.beginPath();
          ctx.moveTo(0, 400);
          ctx.quadraticCurveTo(160, 310, 330, 395);
          ctx.quadraticCurveTo(520, 320, 800, 400);
          ctx.lineTo(800, H); ctx.lineTo(0, H);
          ctx.closePath(); ctx.fill();

          // Nubes suaves con movimiento lento
          const drift = (t * 0.12) % (W + 200);
          drawCloud(ctx, ((100 + drift) % (W + 200)) - 100, 55, 1);
          drawCloud(ctx, ((420 + drift * 0.7) % (W + 200)) - 100, 95, 0.8);
          drawCloud(ctx, ((650 + drift * 0.5) % (W + 200)) - 100, 40, 1.1);

          // Lianas colgando desde arriba
          ctx.strokeStyle = 'rgba(22,101,52,0.55)';
          ctx.lineWidth = 4;
          [80, 250, 560, 730].forEach((vx, i) => {
            const sway = Math.sin(t * 0.02 + i) * 6;
            ctx.beginPath();
            ctx.moveTo(vx, 0);
            ctx.quadraticCurveTo(vx + sway, 40, vx + sway * 1.5, 85 + i * 8);
            ctx.stroke();
            // hoja al final
            ctx.fillStyle = 'rgba(34,139,58,0.7)';
            ctx.beginPath();
            ctx.ellipse(vx + sway * 1.5, 88 + i * 8, 7, 4, 0.6, 0, Math.PI * 2);
            ctx.fill();
          });
        };

        const drawCloud = (ctx, x, y, s = 1) => {
          ctx.save();
          ctx.translate(x, y);
          ctx.scale(s, s);
          ctx.fillStyle = 'rgba(255,255,255,0.55)';
          ctx.beginPath(); ctx.arc(2, 6, 16, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(34, 6, 16, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath(); ctx.arc(0, 2, 14, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(16, -6, 18, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(32, 2, 14, 0, Math.PI * 2); ctx.fill();
          ctx.restore();

        const drawTree = (ctx, x, y, s = 1) => {
          ctx.save();

          tg.addColorStop(0, '#92400e'); tg.addColorStop(0.5, '#b45309'); tg.addColorStop(1, '#78350f');
          ctx.fillStyle = tg;
          ctx.beginPath();
          ctx.moveTo(-6, 0);
          ctx.quadraticCurveTo(-3, -22, -4, -40);
          ctx.lineTo(4, -40);
          ctx.quadraticCurveTo(3, -22, 6, 0);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle = 'rgba(69,26,3,0.4)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(-1, -5); ctx.quadraticCurveTo(0, -18, -1, -30); ctx.stroke();
          // copa en capas
          const leaves = [
            { x: 0, y: -55, r: 24, c: '#15803d' },
            { x: -18, y: -46, r: 17, c: '#166534' },

          leaves.forEach(l => {
            ctx.fillStyle = l.c;

          // brillo

        const drawPlatform = (ctx, p, theme, isGround) => {
          const grassH = 12;

          for (let i = 0; i < Math.floor(p.width / 34); i++) {

            const py = p.y + 12 + ((p.x + i * 29) % Math.max(4, p.height - 16));
            ctx.beginPath(); ctx.ellipse(px, py, 3, 2, 0.3, 0, Math.PI * 2); ctx.fill();
          }
          // capa de hierba
          const gg = ctx.createLinearGradient(0, p.y, 0, p.y + grassH);

          ctx.fill();
          // borde de hierba irregular
          ctx.fillStyle = theme.grass;
          for (let gx = p.x + 6; gx < p.x + p.width - 4; gx += 12) {
            ctx.beginPath();
            ctx.arc(gx, p.y + grassH, 4, 0, Math.PI);
            ctx.fill();
          }
          // brillo superior
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          rr(ctx, p.x + 4, p.y + 2, p.width - 8, 3, 2);
          ctx.fill();
        };

        // Jaula dorada con animal dentro
        const drawCage = (ctx, cage, t) => {

          const sp = (t * 0.08 + cage.id * 2) % 6;

            { emoji: '🦘', es: 'Canguro',   en: 'Kangaroo',  domestic: 'salvaje',   habitat: 'terrestre', diet: 'herbivoro' },
            { emoji: '🦡', es: 'Tejón',     en: 'Badger',    domestic: 'salvaje',   habitat: 'terrestre', diet: 'omnivoro' },
            { emoji: '🐀', es: 'Ratón',     en: 'Mouse',     domestic: 'salvaje',   habitat: 'terrestre', diet: 'omnivoro' }
          ];

          const costumes = [
            { id: 'default',   name: 'Capitulín',  price: 0 },
            { id: 'superman',  name: 'Superman',   price: 5 },
            { id: 'spiderman', name: 'Spiderman',  price: 5 },
            { id: 'hulk',      name: 'Hulk',       price: 5 },
            { id: 'thor',      name: 'Thor',       price: 5 },
            { id: 'mario',     name: 'Mario Bros', price: 5 },
            { id: 'batman',    name: 'Batman',     price: 5 },
            { id: 'ironman',   name: 'Iron Man',   price: 5 }
          ];

          const getCurrentLevelData = () => LEVELS[`level${currentLevel}`] || LEVELS.level1;

          useEffect(() => {
            if (screen === 'game' && cagePositions.length === 0) {
              generateCages();
            }
          }, [screen, currentLevel]);

          useEffect(() => {
            if (screen === 'game' && !showQuestion && !showLevelComplete) {
              gameLoopRef.current = setInterval(() => {
                updateGame();
              }, 1000 / 60);
              return () => { if (gameLoopRef.current) clearInterval(gameLoopRef.current); };
            }
          }, [screen, showQuestion, showLevelComplete, playerPos.x, playerPos.y, velocity.y, isJumping]);

          useEffect(() => {
            const handleKeyDown = (e) => {
              keysPressed.current[e.key] = true;
              if ((e.key === 'ArrowUp' || e.key === ' ') && !isJumping && !showQuestion && !showLevelComplete) {
                setVelocity(v => ({ ...v, y: -15 }));
                setIsJumping(true);
              }
            };
            const handleKeyUp = (e) => { keysPressed.current[e.key] = false; };
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            return () => {
              window.removeEventListener('keydown', handleKeyDown);
              window.removeEventListener('keyup', handleKeyUp);
            };
          }, [isJumping, showQuestion, showLevelComplete]);

          const generateCages = () => {
            const levelData = getCurrentLevelData();
            // Barajamos animales para asignar uno visible a cada jaula
            const shuffled = [...allAnimals].sort(() => Math.random() - 0.5);
            const newCages = levelData.platforms.slice(1).map((platform, idx) => ({
              x: platform.x + platform.width / 2 - 20,
              y: platform.y - 55,
              collected: false,
              id: idx,
              emoji: shuffled[idx % shuffled.length].emoji,
              animal: shuffled[idx % shuffled.length]
            }));
            setCagePositions(newCages);
          };

          const getRandomAnimal = () => {
            const availableAnimals = allAnimals.filter(a => !usedAnimals.includes(a.es));
            if (availableAnimals.length === 0) {
              setUsedAnimals([]);
              return allAnimals[Math.floor(Math.random() * allAnimals.length)];
            }
            const randomAnimal = availableAnimals[Math.floor(Math.random() * availableAnimals.length)];
            setUsedAnimals([...usedAnimals, randomAnimal.es]);
            return randomAnimal;
          };

          const updateGame = () => {
            const levelData = getCurrentLevelData();
            timeRef.current += 1;

            setPlayerPos(prev => {
              let newX = prev.x;
              let moving = false;
              if (keysPressed.current['ArrowLeft'] || touchControls.current.left) {
                newX -= 5; facingRef.current = -1; moving = true;
              }
              if (keysPressed.current['ArrowRight'] || touchControls.current.right) {
                newX += 5; facingRef.current = 1; moving = true;
              }
              if (moving) walkRef.current += 0.35;
              newX = Math.max(20, Math.min(780, newX));
              return { ...prev, x: newX };
            });

            setVelocity(prev => {
              let newVelY = prev.y + 0.6;
              levelData.platforms.forEach(platform => {
                if (
                  playerPos.x + 20 > platform.x &&
                  playerPos.x - 20 < platform.x + platform.width &&
                  playerPos.y + 45 >= platform.y &&
                  playerPos.y + 45 <= platform.y + 20 &&
                  newVelY >= 0
                ) {
                  newVelY = 0;
                  setPlayerPos(p => ({ ...p, y: platform.y - 45 }));
                  setIsJumping(false);
                }
              });
              return { ...prev, y: newVelY };
            });

            setPlayerPos(prev => ({
              ...prev,
              y: Math.min(prev.y + velocity.y, 455)
            }));

            cagePositions.forEach(cage => {
              if (
                !cage.collected &&
                Math.abs(playerPos.x - cage.x - 20) < 40 &&
                Math.abs(playerPos.y - cage.y - 20) < 45
              ) {
                collectCage(cage.id);
              }
            });

            const allCollected = cagePositions.every(cage => cage.collected);
            if (allCollected && cagePositions.length > 0 && !showLevelComplete) {
              completeLevel();
            }
          };

          const collectCage = (cageId) => {
            SoundSystem.playCollect();
            const cage = cagePositions.find(c => c.id === cageId);
            setCagePositions(prev =>
              prev.map(c => c.id === cageId ? { ...c, collected: true } : c)
            );
            // El animal de la jaula es el que se pregunta (más coherente visualmente)
            const animal = cage && cage.animal ? cage.animal : getRandomAnimal();
            setCurrentAnimal(animal);
            setShowQuestion(true);
          };

          const completeLevel = () => {
            setShowLevelComplete(true);
            setUsedAnimals([]);
          };

          const nextLevel = () => {
            if (currentLevel < 5) {
              setCurrentLevel(currentLevel + 1);
              setPlayerPos({ x: 50, y: 300 });
              setVelocity({ x: 0, y: 0 });
              setIsJumping(false);
              setCagePositions([]);
              setShowLevelComplete(false);
            } else {
              resetGame();
              setScreen('finished');
            }
          };

          const handleAnswer = (answer) => {
            let correct = false;
            let correctAnswer = '';
            if (gameMode === 'domestic') {
              correct = answer === currentAnimal.domestic;
              correctAnswer = currentAnimal.domestic;
            } else if (gameMode === 'habitat') {
              correct = answer === currentAnimal.habitat;
              correctAnswer = currentAnimal.habitat;
            } else if (gameMode === 'diet') {
              correct = answer === currentAnimal.diet;
              correctAnswer = currentAnimal.diet;
            }

            if (correct) {
              SoundSystem.playSuccess();
              setShowFeedback('correct');
              setCoins(c => c + 1);
              setTotalAnimalsFreed(t => t + 1);
              setTimeout(() => {
                setShowFeedback(null);
                setShowQuestion(false);
                setCurrentAnimal(null);
              }, 1500);
            } else {
              SoundSystem.playError();
              setShowFeedback({ type: 'incorrect', correct: correctAnswer });
              setTimeout(() => {
                setShowFeedback(null);
                setShowQuestion(false);
                setCurrentAnimal(null);
              }, 3000);
            }
          };

          const buyCostume = (costumeId) => {
            const costume = costumes.find(c => c.id === costumeId);
            if (coins >= costume.price && !ownedCostumes.includes(costumeId)) {
              setCoins(c => c - costume.price);
              setOwnedCostumes([...ownedCostumes, costumeId]);
              setCurrentCostume(costumeId);
            } else if (ownedCostumes.includes(costumeId)) {
              setCurrentCostume(costumeId);
            }
          };

          const getOptionLabel = (mode, option) => {
            const labels = {
              domestico: '🏠 Doméstico', salvaje: '🌴 Salvaje',
              terrestre: '🐾 Terrestre', acuatico: '💧 Acuático', aereo: '🪶 Aéreo',
              herbivoro: '🌱 Herbívoro', carnivoro: '🥩 Carnívoro', omnivoro: '🍽️ Omnívoro'
            };
            return labels[option] || option;
          };

          const resetGame = () => {
            setCurrentLevel(1);
            setPlayerPos({ x: 50, y: 300 });
            setVelocity({ x: 0, y: 0 });
            setIsJumping(false);
            setCagePositions([]);
            setShowQuestion(false);
            setCurrentAnimal(null);
            setShowFeedback(null);
            setShowLevelComplete(false);
            setUsedAnimals([]);
          };

          const handleJump = () => {
            if (!isJumping && !showQuestion && !showLevelComplete) {
              setVelocity(v => ({ ...v, y: -15 }));
              setIsJumping(true);
            }
          };

          // ===== Render del canvas =====
          useEffect(() => {
            if (screen === 'game' && canvasRef.current) {
              const canvas = canvasRef.current;
              const ctx = canvas.getContext('2d');
              const levelData = getCurrentLevelData();
              const t = timeRef.current;

              ctx.clearRect(0, 0, canvas.width, canvas.height);

              // Fondo de selva
              drawJungleBackground(ctx, canvas.width, canvas.height, levelData.theme, t);

              // Decoración de suelo (detrás de plataformas)
              drawTree(ctx, 60, 450, 1.1);
              drawTree(ctx, 720, 450, 1.25);
              drawTree(ctx, 310, 450, 0.9);
              drawBush(ctx, 170, 450);
              drawBush(ctx, 520, 450);
              drawBush(ctx, 660, 450);
              drawFlower(ctx, 120, 450, '#f472b6');
              drawFlower(ctx, 420, 450, '#fb923c');
              drawFlower(ctx, 590, 450, '#a78bfa');
              drawFlower(ctx, 235, 450, '#f87171');

              // Plataformas con hierba
              levelData.platforms.forEach((platform, idx) => {
                drawPlatform(ctx, platform, levelData.theme, idx === 0);
              });

              // Jaulas con animales
              cagePositions.forEach(cage => {
                if (!cage.collected) drawCage(ctx, cage, t);
              });

              // Personaje con sombra
              ctx.fillStyle = 'rgba(0,0,0,0.18)';
              ctx.beginPath();
              ctx.ellipse(playerPos.x, playerPos.y + 55, isJumping ? 12 : 17, 4, 0, 0, Math.PI * 2);
              ctx.fill();

              drawCharacter(ctx, playerPos.x, playerPos.y, currentCostume, 1.5, {
                facing: facingRef.current,
                walk: walkRef.current,
                jumping: isJumping
              });
            }
          });

          // ============ PANTALLAS ============

          if (screen === 'start') {
            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: 'linear-gradient(to bottom, #7dd3fc 0%, #bae6fd 45%, #86efac 100%)',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                padding: '20px', position: 'relative', overflow: 'hidden'
              }}>
                {/* Decoración */}
                <div style={{ position: 'absolute', top: '6%', left: '8%', fontSize: '3rem', opacity: 0.9 }} className="anim-float">🌴</div>
                <div style={{ position: 'absolute', top: '12%', right: '10%', fontSize: '2.5rem', opacity: 0.9 }} className="anim-float">🦜</div>
                <div style={{ position: 'absolute', bottom: '12%', left: '12%', fontSize: '2.5rem', opacity: 0.9 }} className="anim-float">🐵</div>
                <div style={{ position: 'absolute', bottom: '18%', right: '8%', fontSize: '3rem', opacity: 0.9 }} className="anim-float">🌺</div>

                <canvas
                  ref={el => {
                    if (el) {
                      const c = el.getContext('2d');
                      c.clearRect(0, 0, 140, 130);
                      drawCharacter(c, 70, 55, 'default', 3, { facing: 1, walk: 0, jumping: false });
                    }
                  }}
                  width={140} height={130}
                  className="anim-bounce"
                  style={{ marginBottom: '10px' }}
                  aria-label="Capitulín"
                />

                <h1 className="title-word" style={{ marginBottom: '4px', textAlign: 'center' }}>
                  CAPITULÍN
                </h1>
                <h2 style={{
                  fontSize: 'clamp(1.1rem, 4.5vw, 1.6rem)', fontWeight: 600,
                  color: 'var(--color-primary-dark)', marginBottom: '8px', textAlign: 'center'
                }}>
                  🌿 Aventura en la Selva 🌿
                </h2>
                <p style={{
                  fontSize: 'clamp(0.95rem, 3.5vw, 1.15rem)', color: 'var(--color-text)',
                  marginBottom: '36px', textAlign: 'center', maxWidth: '420px'
                }}>
                  ¡Rescata a los animales y aprende sus nombres en español e inglés!
                </p>
                <button
                  className="clay-btn btn-orange anim-pop"
                  onClick={() => setScreen('menu')}
                  style={{ fontSize: 'clamp(1.5rem, 5vw, 2rem)', padding: '20px 64px' }}
                >
                  ¡JUGAR! 🎮
                </button>
              </div>
            );
          }

          if (screen === 'menu') {
            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: 'linear-gradient(to bottom, #bae6fd, #dcfce7)',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                padding: '20px'
              }}>
                <h2 style={{
                  fontSize: 'clamp(1.6rem, 6vw, 2.5rem)', fontWeight: 700,
                  color: 'var(--color-text)', marginBottom: '32px', textAlign: 'center'
                }}>
                  Elige tu Aventura
                </h2>

                <button
                  className="clay-btn btn-amber anim-fade"
                  onClick={() => { setGameMode('domestic'); resetGame(); setScreen('game'); }}
                  style={{ fontSize: 'clamp(1rem, 4vw, 1.4rem)', padding: '20px 32px', margin: '12px', width: '92%', maxWidth: '500px' }}
                >
                  🏠 vs 🌴 &nbsp;Domésticos o Salvajes
                </button>

                <button
                  className="clay-btn btn-blue anim-fade"
                  onClick={() => { setGameMode('habitat'); resetGame(); setScreen('game'); }}
                  style={{ fontSize: 'clamp(1rem, 4vw, 1.4rem)', padding: '20px 32px', margin: '12px', width: '92%', maxWidth: '500px', animationDelay: '0.08s' }}
                >
                  🐾 💧 🪶 &nbsp;Terrestre, Acuático o Aéreo
                </button>

                <button
                  className="clay-btn btn-green anim-fade"
                  onClick={() => { setGameMode('diet'); resetGame(); setScreen('game'); }}
                  style={{ fontSize: 'clamp(1rem, 4vw, 1.4rem)', padding: '20px 32px', margin: '12px', width: '92%', maxWidth: '500px', animationDelay: '0.16s' }}
                >
                  🌱 🥩 🍽️ &nbsp;Herbívoro, Carnívoro u Omnívoro
                </button>

                <div style={{ display: 'flex', gap: '14px', marginTop: '30px' }}>
                  <button
                    className="clay-btn btn-pink"
                    onClick={() => setScreen('stats')}
                    style={{ fontSize: 'clamp(0.95rem, 3vw, 1.2rem)', padding: '15px 30px' }}
                  >
                    📊 Estadísticas
                  </button>
                  <button
                    className="clay-btn btn-orange"
                    onClick={() => setScreen('shop')}
                    style={{ fontSize: 'clamp(0.95rem, 3vw, 1.2rem)', padding: '15px 30px' }}
                  >
                    🛍️ Tienda
                  </button>
                </div>
              </div>
            );
          }

          if (screen === 'stats') {
            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: 'linear-gradient(to bottom, #fce7f3, #fef9c3)',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                padding: '20px'
              }}>
                <h2 style={{ fontSize: 'clamp(1.6rem, 6vw, 2.5rem)', fontWeight: 700, color: '#be185d', marginBottom: '28px' }}>
                  📊 Estadísticas
                </h2>

                <div className="clay-card anim-pop" style={{ padding: '32px', minWidth: '80%', maxWidth: '400px' }}>
                  <p style={{ fontSize: 'clamp(1.2rem, 4vw, 1.7rem)', margin: '16px 0', color: 'var(--color-text)' }}>
                    🦁 Animales liberados: <strong>{totalAnimalsFreed}</strong>
                  </p>
                  <p style={{ fontSize: 'clamp(1.2rem, 4vw, 1.7rem)', margin: '16px 0', color: 'var(--color-text)' }}>
                    🎭 Trajes: <strong>{ownedCostumes.length}/8</strong>
                  </p>
                  <p style={{ fontSize: 'clamp(1.2rem, 4vw, 1.7rem)', margin: '16px 0', color: 'var(--color-text)' }}>
                    🪙 Monedas: <strong>{coins}</strong>
                  </p>
                </div>

                <button
                  className="clay-btn btn-pink"
                  onClick={() => setScreen('menu')}
                  style={{ fontSize: 'clamp(1rem, 4vw, 1.4rem)', padding: '15px 44px', marginTop: '36px' }}
                >
                  ⬅️ Volver
                </button>
              </div>
            );
          }

          if (screen === 'shop') {
            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: 'linear-gradient(to bottom, #fef3c7, #ffedd5)',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'flex-start',
                padding: '20px', overflowY: 'auto'
              }}>
                <h2 style={{ fontSize: 'clamp(1.6rem, 6vw, 2.4rem)', fontWeight: 700, color: '#92400e', margin: '10px 0 6px' }}>
                  🛍️ Tienda de Trajes
                </h2>
                <p style={{
                  fontSize: 'clamp(1rem, 4vw, 1.4rem)', fontWeight: 600, color: '#b45309',
                  marginBottom: '24px', background: '#fff', padding: '8px 22px',
                  borderRadius: '999px', boxShadow: '0 4px 10px rgba(0,0,0,0.1)'
                }}>
                  🪙 {coins} monedas
                </p>

                <div style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))',
                  gap: '16px', width: '100%', maxWidth: '640px', marginBottom: '20px'
                }}>
                  {costumes.map(costume => {
                    const owned = ownedCostumes.includes(costume.id);
                    const canBuy = coins >= costume.price;
                    const isCurrent = currentCostume === costume.id;

                    return (
                      <div
                        key={costume.id}
                        onClick={() => (owned || canBuy) && buyCostume(costume.id)}
                        className="clay-card"
                        style={{
                          background: isCurrent ? '#fef08a' : owned ? '#dcfce7' : canBuy ? 'white' : '#e5e7eb',
                          padding: '14px 10px',
                          textAlign: 'center',
                          cursor: (owned || canBuy) ? 'pointer' : 'not-allowed',
                          opacity: (!owned && !canBuy) ? 0.55 : 1,
                          borderColor: isCurrent ? '#facc15' : 'rgba(0,0,0,0.06)',
                          transition: 'transform 0.15s'
                        }}
                      >
                        <canvas
                          ref={el => {
                            if (el) {
                              const c = el.getContext('2d');
                              c.clearRect(0, 0, 90, 100);
                              drawCharacter(c, 45, 40, costume.id, 1.9, { facing: 1, walk: 0, jumping: false });
                            }
                          }}
                          width={90} height={100}
                          aria-label={costume.name}
                        />
                        <div style={{ fontWeight: 700, fontSize: 'clamp(0.85rem, 3vw, 1.05rem)', color: 'var(--color-text)' }}>
                          {costume.name}
                        </div>
                        <div style={{ fontSize: 'clamp(0.8rem, 2.8vw, 0.95rem)', color: '#b45309', fontWeight: 600 }}>
                          {costume.price === 0 ? 'Gratis' : `🪙 ${costume.price}`}
                        </div>
                        {isCurrent && <div style={{ color: '#c2410c', fontWeight: 700, marginTop: '4px', fontSize: 'clamp(0.7rem, 2.5vw, 0.85rem)' }}>✓ EQUIPADO</div>}
                        {owned && !isCurrent && <div style={{ color: '#15803d', fontWeight: 600, marginTop: '4px', fontSize: 'clamp(0.7rem, 2.5vw, 0.85rem)' }}>Toca para equipar</div>}
                        {!owned && !canBuy && <div style={{ color: '#6b7280', fontWeight: 600, marginTop: '4px', fontSize: 'clamp(0.7rem, 2.5vw, 0.85rem)' }}>🔒 Bloqueado</div>}
                      </div>
                    );
                  })}
                </div>

                <button
                  className="clay-btn btn-orange"
                  onClick={() => gameMode ? setScreen('game') : setScreen('menu')}
                  style={{ fontSize: 'clamp(1rem, 4vw, 1.4rem)', padding: '15px 40px', margin: '10px 0 30px' }}
                >
                  {gameMode ? '⬅️ Volver al Juego' : '⬅️ Volver al Menú'}
                </button>
              </div>
            );
          }

          if (screen === 'finished') {
            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: 'linear-gradient(to bottom, #fde68a, #86efac)',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', padding: '20px'
              }}>
                <div style={{ fontSize: 'clamp(4rem, 18vw, 6rem)' }} className="anim-bounce">🏆</div>
                <h2 style={{ fontSize: 'clamp(1.8rem, 7vw, 3rem)', fontWeight: 700, color: 'var(--color-text)', margin: '16px 0', textAlign: 'center' }}>
                  ¡Has completado la aventura!
                </h2>
                <p style={{ fontSize: 'clamp(1.1rem, 4.5vw, 1.5rem)', color: 'var(--color-text-muted)', marginBottom: '32px', textAlign: 'center' }}>
                  🦁 Animales liberados: <strong>{totalAnimalsFreed}</strong> · 🪙 Monedas: <strong>{coins}</strong>
                </p>
                <button
                  className="clay-btn btn-green anim-pop"
                  onClick={() => setScreen('menu')}
                  style={{ fontSize: 'clamp(1.2rem, 5vw, 1.6rem)', padding: '18px 50px' }}
                >
                  Volver al Menú 🏠
                </button>
              </div>
            );
          }

          if (screen === 'game') {
            const levelData = getCurrentLevelData();

            return (
              <div style={{
                width: '100vw', height: '100vh',
                background: levelData.uiBg,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                position: 'relative', overflow: 'hidden'
              }}>
                <div style={{ position: 'absolute', top: '10px', left: '10px', display: 'flex', gap: '10px', zIndex: 100 }}>
                  <button
                    className="clay-btn btn-orange"
                    onClick={() => setScreen('menu')}
                    aria-label="Volver al menú"
                    style={{ padding: '10px 16px', fontSize: '1.1rem', borderRadius: '14px' }}
                  >
                    🏠
                  </button>
                  <button
                    className="clay-btn btn-amber"
                    onClick={() => setScreen('shop')}
                    aria-label="Abrir tienda"
                    style={{ padding: '10px 16px', fontSize: '1.1rem', borderRadius: '14px' }}
                  >
                    🛍️
                  </button>
                </div>

                <div style={{
                  position: 'absolute', top: '10px', right: '10px',
                  backgroundColor: 'rgba(255,255,255,0.92)',
                  padding: '10px 18px', borderRadius: '999px',
                  fontSize: 'clamp(0.9rem, 3vw, 1.25rem)', fontWeight: 700,
                  color: 'var(--color-text)',
                  boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
                  zIndex: 100
                }}>
                  Nivel {currentLevel} &nbsp;|&nbsp; 🪙 {coins}
                </div>

                <canvas
                  ref={canvasRef}
                  width={800}
                  height={500}
                  style={{
                    border: '5px solid var(--color-primary-dark)',
                    borderRadius: '16px',
                    width: '100vw',
                    height: 'auto',
                    maxHeight: '62vh',
                    boxShadow: '0 12px 30px rgba(0,0,0,0.2)'
                  }}
                />

                {/* CONTROLES TÁCTILES */}
                <div className="touch-controls">
                  <div className="left-controls">
                    <div
                      className="touch-btn"
                      role="button" aria-label="Izquierda"
                      onTouchStart={() => touchControls.current.left = true}
                      onTouchEnd={() => touchControls.current.left = false}
                      onMouseDown={() => touchControls.current.left = true}
                      onMouseUp={() => touchControls.current.left = false}
                      onMouseLeave={() => touchControls.current.left = false}
                    >
                      <ArrowLeftIcon />
                    </div>
                    <div
                      className="touch-btn"
                      role="button" aria-label="Derecha"
                      onTouchStart={() => touchControls.current.right = true}
                      onTouchEnd={() => touchControls.current.right = false}
                      onMouseDown={() => touchControls.current.right = true}
                      onMouseUp={() => touchControls.current.right = false}
                      onMouseLeave={() => touchControls.current.right = false}
                    >
                      <ArrowRightIcon />
                    </div>
                  </div>
                  <div
                    className="touch-btn"
                    role="button" aria-label="Saltar"
                    onTouchStart={handleJump}
                    onClick={handleJump}
                  >
                    <JumpIcon />
                  </div>
                </div>

                {showLevelComplete && (
                  <div style={{
                    position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh',
                    backgroundColor: 'rgba(20,83,45,0.55)', backdropFilter: 'blur(4px)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000
                  }}>
                    <div className="clay-card anim-pop" style={{ padding: '40px', textAlign: 'center', maxWidth: '90%' }}>
                      <div style={{ fontSize: 'clamp(3rem, 12vw, 4.5rem)' }} className="anim-bounce">🎉</div>
                      <h2 style={{ fontSize: 'clamp(1.7rem, 7vw, 2.6rem)', fontWeight: 700, color: 'var(--color-secondary-dark)', margin: '12px 0 24px' }}>
                        ¡NIVEL COMPLETADO!
                      </h2>
                      <button
                        className="clay-btn btn-green"
                        onClick={nextLevel}
                        style={{ fontSize: 'clamp(1.2rem, 5vw, 1.5rem)', padding: '16px 44px' }}
                      >
                        {currentLevel < 5 ? 'Siguiente Nivel ➡️' : '¡Finalizar! 🏆'}
                      </button>
                    </div>
                  </div>
                )}

                {showQuestion && currentAnimal && (
                  <div style={{
                    position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh',
                    backgroundColor: 'rgba(20,83,45,0.55)', backdropFilter: 'blur(4px)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    zIndex: 1000, padding: '20px'
                  }}>
                    <div
                      className={"clay-card " + (showFeedback === 'correct' ? 'anim-correct' : showFeedback && showFeedback.type === 'incorrect' ? 'anim-shake' : 'anim-pop')}
                      style={{
                        padding: 'clamp(20px, 5vw, 40px)',
                        textAlign: 'center',
                        maxWidth: '92%',
                        maxHeight: '92%',
                        overflowY: 'auto',
                        minWidth: 'min(400px, 88vw)'
                      }}
                    >
                      {/* Animal grande + nombre bilingüe */}
                      <div style={{ fontSize: 'clamp(3.5rem, 14vw, 5.5rem)', lineHeight: 1 }}>
                        {currentAnimal.emoji}
                      </div>
                      <div style={{ margin: '10px 0 6px' }}>
                        <BilingualName animal={currentAnimal} size="big" />
                      </div>

                      {showFeedback === 'correct' && (
                        <div style={{ marginTop: '14px' }}>
                          <div style={{
                            fontSize: 'clamp(1.7rem, 8vw, 2.6rem)',
                            color: 'var(--color-success)', fontWeight: 700
                          }}>
                            ✅ ¡CORRECTO! 🎉
                          </div>
                          <div style={{
                            display: 'inline-block', marginTop: '10px',
                            background: 'var(--color-success-bg)', color: 'var(--color-success)',
                            fontWeight: 700, padding: '8px 22px', borderRadius: '999px',
                            fontSize: 'clamp(1.1rem, 4.5vw, 1.5rem)'
                          }}>
                            +1 🪙
                          </div>
                        </div>
                      )}

                      {showFeedback && showFeedback.type === 'incorrect' && (
                        <div style={{ marginTop: '14px' }}>
                          <div style={{
                            fontSize: 'clamp(1.3rem, 6vw, 1.9rem)',
                            color: 'var(--color-error)', fontWeight: 700, marginBottom: '12px'
                          }}>
                            ❌ No es correcto 😊
                          </div>
                          <div style={{
                            display: 'inline-block',
                            background: 'var(--color-error-bg)',
                            padding: '10px 24px', borderRadius: '14px',
                            fontSize: 'clamp(1.1rem, 4.5vw, 1.5rem)', color: 'var(--color-text)'
                          }}>
                            Respuesta correcta: <strong>{getOptionLabel(gameMode, showFeedback.correct)}</strong>
                          </div>
                        </div>
                      )}

                      {!showFeedback && (
                        <React.Fragment>
                          <h3 style={{
                            fontSize: 'clamp(1.2rem, 4.5vw, 1.7rem)', fontWeight: 600,
                            margin: '14px 0 22px', color: 'var(--color-text-muted)'
                          }}>
                            {gameMode === 'domestic' && '¿Es doméstico o salvaje?'}
                            {gameMode === 'habitat' && '¿Dónde vive este animal?'}
                            {gameMode === 'diet' && '¿Qué come este animal?'}
                          </h3>

                          <div style={{ display: 'flex', flexDirection: 'column', gap: '14px', alignItems: 'center' }}>
                            {gameMode === 'domestic' && (
                              <React.Fragment>
                                <button className="clay-btn btn-amber" onClick={() => handleAnswer('domestico')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🏠 Doméstico
                                </button>
                                <button className="clay-btn btn-green" onClick={() => handleAnswer('salvaje')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🌴 Salvaje
                                </button>
                              </React.Fragment>
                            )}

                            {gameMode === 'habitat' && (
                              <React.Fragment>
                                <button className="clay-btn btn-brown" onClick={() => handleAnswer('terrestre')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🐾 Terrestre
                                </button>
                                <button className="clay-btn btn-blue" onClick={() => handleAnswer('acuatico')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  💧 Acuático
                                </button>
                                <button className="clay-btn btn-amber" onClick={() => handleAnswer('aereo')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🪶 Aéreo
                                </button>
                              </React.Fragment>
                            )}

                            {gameMode === 'diet' && (
                              <React.Fragment>
                                <button className="clay-btn btn-green" onClick={() => handleAnswer('herbivoro')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🌱 Herbívoro
                                </button>
                                <button className="clay-btn btn-pink" onClick={() => handleAnswer('carnivoro')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🥩 Carnívoro
                                </button>
                                <button className="clay-btn btn-amber" onClick={() => handleAnswer('omnivoro')}
                                  style={{ fontSize: 'clamp(1.15rem, 5vw, 1.6rem)', padding: '16px 30px', width: '92%', maxWidth: '320px' }}>
                                  🍽️ Omnívoro
                                </button>
                              </React.Fragment>
                            )}
                          </div>
                        </React.Fragment>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          }

          return null;
        };

        ReactDOM.render(<CapitulinGame />, document.getElementById('root'));
    </script>
</body>
</html>
